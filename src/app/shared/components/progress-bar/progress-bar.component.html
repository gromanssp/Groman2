<div class="progress-container" [style.height.px]="height">
  <div class="progress-fill"
    [ngClass]="['fill-' + variant, striped ? 'striped' : '', animated ? 'animated' : '']"
    [style.width.%]="value">
    @if (label) {
      <span class="progress-label">{{ label }}</span>
    }
  </div>
</div>

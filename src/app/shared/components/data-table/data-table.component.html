<div class="table-wrapper">
  <table class="data-table" [class.striped]="striped" [class.hoverable]="hover" [class.bordered]="bordered">
    <thead>
      <tr>
        <th *ngFor="let col of columns" [style.width]="col.width || 'auto'">{{ col.label }}</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let row of data">
        <td *ngFor="let col of columns">{{ row[col.key] }}</td>
      </tr>
    </tbody>
  </table>
</div>

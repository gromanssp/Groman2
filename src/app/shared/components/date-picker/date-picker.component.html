<div class="date-picker">
  <div class="date-input" (click)="toggleDropdown()" [class.active]="isOpen">
    <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
      <line x1="16" y1="2" x2="16" y2="6"/>
      <line x1="8" y1="2" x2="8" y2="6"/>
      <line x1="3" y1="10" x2="21" y2="10"/>
    </svg>
    <span class="input-text" [class.placeholder]="!displayValue">
      {{ displayValue || placeholder }}
    </span>
    <svg class="chevron-icon" [class.rotated]="isOpen" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <polyline points="6 9 12 15 18 9"/>
    </svg>
  </div>

  @if (isOpen) {
    <div class="dropdown">
      <div class="calendar-header">
        <button class="nav-btn" (click)="prevMonth(); $event.stopPropagation()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="15 18 9 12 15 6"/>
          </svg>
        </button>
        <span class="month-label">{{ monthLabel }}</span>
        <button class="nav-btn" (click)="nextMonth(); $event.stopPropagation()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="9 6 15 12 9 18"/>
          </svg>
        </button>
      </div>
      <div class="weekdays">
        @for (wd of weekDays; track wd) {
          <span class="weekday">{{ wd }}</span>
        }
      </div>
      <div class="days-grid">
        @for (day of calendarDays; track day) {
          <span
            class="day-cell"
            [class.empty]="!day"
            [class.today]="isToday(day)"
            [class.selected]="isSelected(day)"
            [class.in-range]="isInRange(day)"
            [class.range-start]="isRangeStart(day)"
            [class.range-end]="isRangeEnd(day)"
            [class.disabled]="isDisabled(day)"
            (click)="selectDay(day); $event.stopPropagation()"
            >
            {{ day ? day.getDate() : '' }}
          </span>
        }
      </div>
    </div>
  }
</div>

<div class="spinner-wrapper" [ngClass]="'size-' + size">
  <!-- Circular spinner -->
  @if (variant === 'circular') {
    <div
      class="spinner-circular"
      [style.width.px]="sizeInPx"
      [style.height.px]="sizeInPx"
      [style.borderColor]="'transparent'"
      [style.borderTopColor]="color"
      [style.borderRightColor]="color"
      [style.borderBottomColor]="color"
    ></div>
  }

  <!-- Dots spinner -->
  @if (variant === 'dots') {
    <div class="spinner-dots">
      <span class="dot dot-1" [style.backgroundColor]="color" [style.width.px]="sizeInPx * 0.28" [style.height.px]="sizeInPx * 0.28"></span>
      <span class="dot dot-2" [style.backgroundColor]="color" [style.width.px]="sizeInPx * 0.28" [style.height.px]="sizeInPx * 0.28"></span>
      <span class="dot dot-3" [style.backgroundColor]="color" [style.width.px]="sizeInPx * 0.28" [style.height.px]="sizeInPx * 0.28"></span>
    </div>
  }

  <!-- Pulse spinner -->
  @if (variant === 'pulse') {
    <div
      class="spinner-pulse"
      [style.width.px]="sizeInPx"
      [style.height.px]="sizeInPx"
      [style.backgroundColor]="color"
    ></div>
  }
</div>

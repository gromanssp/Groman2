<div class="code-snippet-wrapper">
  <button class="copy-btn" (click)="copyToClipboard()" [class.copied]="copied" [title]="copied ? 'Copied!' : 'Copy code'">
    <svg *ngIf="!copied" fill="none" viewBox="0 0 24 24" stroke="currentColor">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z" />
    </svg>
    <svg *ngIf="copied" fill="none" viewBox="0 0 24 24" stroke="currentColor">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
    </svg>
    <span class="copy-label">{{ copied ? 'Copied!' : 'Copy' }}</span>
  </button>
  <pre class="code-block"><code>{{ code }}</code></pre>
</div>

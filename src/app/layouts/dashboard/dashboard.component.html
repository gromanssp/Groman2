<div class="dashboard-layout" [class.sidebar-collapsed]="collapsed$ | async" [class.sidebar-mobile-open]="mobileOpen$ | async">
  <div class="sidebar-backdrop" *ngIf="mobileOpen$ | async" (click)="closeMobile()"></div>
  <app-sidebar class="sidebar-container"></app-sidebar>
  <div class="main-content">
    <app-navbar></app-navbar>
    <main class="page-content">
      <router-outlet></router-outlet>
    </main>
  </div>
</div>

<div class="not-found-container">
  <div class="not-found-content">
    <!-- Floating SVG Illustration -->
    <div class="illustration">
      <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" class="astronaut-svg">
        <!-- Stars -->
        <circle cx="20" cy="30" r="1.5" fill="rgba(255,255,255,0.6)">
          <animate attributeName="opacity" values="0.3;1;0.3" dur="2s" repeatCount="indefinite"/>
        </circle>
        <circle cx="170" cy="25" r="1" fill="rgba(255,255,255,0.5)">
          <animate attributeName="opacity" values="0.5;1;0.5" dur="3s" repeatCount="indefinite"/>
        </circle>
        <circle cx="45" cy="160" r="1.5" fill="rgba(255,255,255,0.4)">
          <animate attributeName="opacity" values="0.4;1;0.4" dur="2.5s" repeatCount="indefinite"/>
        </circle>
        <circle cx="155" cy="170" r="1" fill="rgba(255,255,255,0.6)">
          <animate attributeName="opacity" values="0.6;1;0.6" dur="1.8s" repeatCount="indefinite"/>
        </circle>
        <circle cx="180" cy="80" r="1.5" fill="rgba(255,255,255,0.5)">
          <animate attributeName="opacity" values="0.3;0.9;0.3" dur="2.2s" repeatCount="indefinite"/>
        </circle>

        <!-- Planet -->
        <circle cx="150" cy="145" r="22" fill="rgba(99, 102, 241, 0.15)" stroke="rgba(99, 102, 241, 0.4)" stroke-width="1"/>
        <ellipse cx="150" cy="145" rx="32" ry="6" fill="none" stroke="rgba(168, 85, 247, 0.3)" stroke-width="1.5" transform="rotate(-20 150 145)"/>

        <!-- Astronaut body -->
        <g transform="translate(75, 55)">
          <!-- Helmet -->
          <circle cx="25" cy="22" r="20" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>
          <!-- Visor -->
          <path d="M13 18 Q25 8 37 18 Q37 30 25 32 Q13 30 13 18Z" fill="rgba(99, 102, 241, 0.25)" stroke="rgba(99, 102, 241, 0.5)" stroke-width="1"/>
          <!-- Visor reflection -->
          <path d="M18 16 Q22 12 26 16" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="0.8" stroke-linecap="round"/>

          <!-- Body -->
          <rect x="10" y="40" rx="8" ry="8" width="30" height="35" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.25)" stroke-width="1.5"/>
          <!-- Backpack -->
          <rect x="38" y="42" rx="3" ry="3" width="10" height="28" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>

          <!-- Left arm -->
          <path d="M10 50 Q-5 55 -2 68" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="4" stroke-linecap="round"/>
          <!-- Right arm waving -->
          <path d="M40 48 Q55 35 58 25" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="4" stroke-linecap="round"/>
          <!-- Hand -->
          <circle cx="58" cy="24" r="3" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.25)" stroke-width="1"/>

          <!-- Left leg -->
          <path d="M18 75 Q15 90 10 98" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="4" stroke-linecap="round"/>
          <!-- Right leg -->
          <path d="M32 75 Q35 90 40 98" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="4" stroke-linecap="round"/>

          <!-- Tether line -->
          <path d="M48 60 Q65 70 70 90 Q72 110 60 120" fill="none" stroke="rgba(168, 85, 247, 0.3)" stroke-width="1" stroke-dasharray="3 3"/>
        </g>
      </svg>
    </div>

    <h1 class="error-code text-gradient">404</h1>
    <h2 class="error-title">Page Not Found</h2>
    <p class="error-message">The page you're looking for doesn't exist or has been moved.</p>
    <a routerLink="/home" class="btn btn-gradient">Go to Dashboard</a>
  </div>
</div>

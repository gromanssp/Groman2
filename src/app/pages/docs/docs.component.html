<div class="page-container">
  <header class="page-header">
    <div class="header-row">
      <h1 class="heading-2">Documentation</h1>
      <button
        class="btn-download-green"
        (click)="downloadTemplate()"
        [disabled]="isGenerating()">
        @if (isGenerating()) {
          <svg class="spinner-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83" />
          </svg>
          Generating...
        } @else {
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
            <polyline points="7 10 12 15 17 10"></polyline>
            <line x1="12" y1="15" x2="12" y2="3"></line>
          </svg>
          Download Template
        }
      </button>
    </div>
    <p class="text-body">Complete reference for all components, directives, services, and project architecture.</p>
  </header>
  <div class="docs-layout">
    <nav class="docs-sidenav glass-panel">
      @for (item of navItems; track item.path) {
        <a
          [routerLink]="item.path"
          routerLinkActive="active"
          class="sidenav-item">
          {{ item.label }}
        </a>
      }
    </nav>
    <div class="docs-content">
      <router-outlet></router-outlet>
    </div>
  </div>
</div>
